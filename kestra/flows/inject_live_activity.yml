# ============================================================
# inject_live_activity.yml — Live demo: inject new activities
# Creates N activities for an employee, publishes to Redpanda,
# sends Slack notifications, consumes into PostgreSQL,
# then recomputes benefits.
# Used during soutenance live demo.
# Inputs: employee_id (STRING), activity_count (INT)
# ============================================================

id: inject_live_activity
namespace: sport_data_solution
description: "Live demo — inject activities, notify Slack, update DB and benefits"

inputs:
  - id: activity_count
    type: INT
    defaults: 3
    description: "Number of activities to inject (random employees)"

tasks:
  - id: inject_and_notify
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Generate activities, publish to Redpanda, send Slack notifications"
    warningOnStdErr: false
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - |
        set -eu

        : "${SPORT_POSTGRES_WRITER_USER:?SPORT_POSTGRES_WRITER_USER is not set}"
        : "${SPORT_POSTGRES_WRITER_PASSWORD:?SPORT_POSTGRES_WRITER_PASSWORD is not set}"
        : "${SPORT_ENCRYPTION_KEY:?SPORT_ENCRYPTION_KEY is not set}"
        : "${SPORT_SLACK_WEBHOOK_URL:?SPORT_SLACK_WEBHOOK_URL is not set}"

        export POSTGRES_EXTERNAL_HOST="postgres"
        export POSTGRES_EXTERNAL_PORT="5432"
        export POSTGRES_DB="sportdb"
        export POSTGRES_WRITER_USER="${SPORT_POSTGRES_WRITER_USER}"
        export POSTGRES_WRITER_PASSWORD="${SPORT_POSTGRES_WRITER_PASSWORD}"
        export ENCRYPTION_KEY="${SPORT_ENCRYPTION_KEY}"
        export SLACK_WEBHOOK_URL="${SPORT_SLACK_WEBHOOK_URL}"
        export REDPANDA_BROKERS="redpanda:9092"
        export REDPANDA_EXTERNAL_BROKER="redpanda:9092"

        cd /workspace
        pip install pandas sqlalchemy psycopg2-binary python-dotenv confluent-kafka requests pydantic --quiet
        python -m src.pipelines.inject_live_activity {{ inputs.activity_count }}

  - id: consume_to_postgres
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Consume new activities from Redpanda into PostgreSQL"
    warningOnStdErr: false
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - |
        set -eu

        : "${SPORT_POSTGRES_WRITER_USER:?SPORT_POSTGRES_WRITER_USER is not set}"
        : "${SPORT_POSTGRES_WRITER_PASSWORD:?SPORT_POSTGRES_WRITER_PASSWORD is not set}"

        export POSTGRES_EXTERNAL_HOST="postgres"
        export POSTGRES_EXTERNAL_PORT="5432"
        export POSTGRES_DB="sportdb"
        export POSTGRES_WRITER_USER="${SPORT_POSTGRES_WRITER_USER}"
        export POSTGRES_WRITER_PASSWORD="${SPORT_POSTGRES_WRITER_PASSWORD}"
        export REDPANDA_BROKERS="redpanda:9092"
        export REDPANDA_EXTERNAL_BROKER="redpanda:9092"

        cd /workspace
        pip install sqlalchemy psycopg2-binary python-dotenv confluent-kafka --quiet
        python -m src.consumers.consumer_postgres

  - id: recompute_benefits
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Recompute benefits with new activity count"
    warningOnStdErr: false
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - |
        set -eu

        : "${SPORT_POSTGRES_WRITER_USER:?SPORT_POSTGRES_WRITER_USER is not set}"
        : "${SPORT_POSTGRES_WRITER_PASSWORD:?SPORT_POSTGRES_WRITER_PASSWORD is not set}"
        : "${SPORT_ENCRYPTION_KEY:?SPORT_ENCRYPTION_KEY is not set}"

        export POSTGRES_EXTERNAL_HOST="postgres"
        export POSTGRES_EXTERNAL_PORT="5432"
        export POSTGRES_DB="sportdb"
        export POSTGRES_WRITER_USER="${SPORT_POSTGRES_WRITER_USER}"
        export POSTGRES_WRITER_PASSWORD="${SPORT_POSTGRES_WRITER_PASSWORD}"
        export ENCRYPTION_KEY="${SPORT_ENCRYPTION_KEY}"

        cd /workspace
        pip install pandas sqlalchemy psycopg2-binary python-dotenv python-dateutil --quiet
        python -m src.pipelines.compute_benefits
