# ============================================================
# docker-compose.yml
# Sport Data Solution - POC Infrastructure
# ============================================================

services:
  postgres:
    image: postgres:15.7
    container_name: sport_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_WRITER_USER: ${POSTGRES_WRITER_USER}
      POSTGRES_WRITER_PASSWORD: ${POSTGRES_WRITER_PASSWORD}
      POSTGRES_READER_USER: ${POSTGRES_READER_USER}
      POSTGRES_READER_PASSWORD: ${POSTGRES_READER_PASSWORD}
      KESTRA_POSTGRES_USER: ${KESTRA_POSTGRES_USER}
      KESTRA_POSTGRES_PASSWORD: ${KESTRA_POSTGRES_PASSWORD}
      METABASE_POSTGRES_USER: ${METABASE_POSTGRES_USER}
      METABASE_POSTGRES_PASSWORD: ${METABASE_POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sport_network

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: sport_redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    ports:
      - "${REDPANDA_EXTERNAL_PORT}:19092"
      - "18082:18082"
      - "18081:18081"
    healthcheck:
      test:
        ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - sport_network

  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: sport_redpanda_console
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "${REDPANDA_CONSOLE_PORT}:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sport_network

  kestra:
    image: kestra/kestra:v0.18.0
    container_name: sport_kestra
    user: "root"
    command: server standalone
    environment:
      DATASOURCES_POSTGRES_URL: jdbc:postgresql://postgres:5432/kestradb
      DATASOURCES_POSTGRES_DRIVER_CLASS_NAME: org.postgresql.Driver
      DATASOURCES_POSTGRES_USERNAME: ${KESTRA_POSTGRES_USER}
      DATASOURCES_POSTGRES_PASSWORD: ${KESTRA_POSTGRES_PASSWORD}
      KESTRA_CONFIGURATION: |
        kestra:
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
    volumes:
      - ./kestra/flows:/flows
      - .:/workspace
      - kestra_data:/app/storage
    ports:
      - "${KESTRA_EXTERNAL_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
    restart: unless-stopped
    networks:
      - sport_network

  metabase:
    image: metabase/metabase:v0.50.24
    platform: linux/amd64
    container_name: sport_metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: ${POSTGRES_DB}
      MB_DB_USER: ${METABASE_POSTGRES_USER}
      MB_DB_PASS: ${METABASE_POSTGRES_PASSWORD}
      JAVA_TIMEZONE: Europe/Paris
    volumes:
      - metabase_data:/metabase-data
    ports:
      - "${METABASE_EXTERNAL_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
    restart: unless-stopped
    networks:
      - sport_network

volumes:
  postgres_data:
  redpanda_data:
  kestra_data:
  metabase_data:

networks:
  sport_network:
    driver: bridge
